          <h1>Station 41013 <a href='https://www.navcen.uscg.gov/?pageName=lightLists' target='_blank' rel='noopener'>(LLNR 815)</a> - Frying Pan Shoals, NC</h1>
          


    <section class="metadata">
    <p><b>Owned and maintained by National Data Buoy Center</b><br>
    <b>33.441 N 77.764 W (33&#176;26'28" N 77&#176;45'50" W)</b></p>
    </section>
    <section class="data">
    <p>Links for real time data for station 41013 are listed below:
    <br>(Times are in GMT, Wind Speed is in m/s, and Wave Height is in meters)</p>
    <ul>
      <li><p>Data for last 24 hours:<b>These real time data have undergone gross error checking only. Please use with discretion.</b></p>
        <ul>
          <li>Real time hourly standard meteorological
          and hourly continuous winds <a href="/data/hourly2/">data directory</a><br>
          with standard meteorological <a href="/faq/measdes.shtml#stdmet"> description</a>
          and continuous winds <a href="/faq/measdes.shtml#cwind"> description</a>.</li>
        </ul>
        <br>
      </li>
      <li><p>Data for last 5 days:<b>These real time data have undergone gross error checking only. Please use with discretion.</b></p>
        <ul>
          <li><a href="/data/5day2/41013_5day.txt">Real time standard meteorological data</a>
          and their <a href="/faq/measdes.shtml#stdmet"> description</a>.</li>
          <li><a href="/data/5day2/41013_5day.spectral">Real time spectral wave data</a>
          and their <a href="/faq/measdes.shtml#swden"> description</a>.</li>
        </ul>
        <br>
      </li>
      <li><p>Data for last 45 days:<b>These real time data have undergone gross error checking only. Please use with discretion.</b></p>
        <ul>
          <li><a href="/data/realtime2/41013.txt">Real time standard meteorological data</a>
          and their <a href="/faq/measdes.shtml#stdmet"> description</a>.</li>
          <li><a href="/data/realtime2/41013.spec">Real time spectral wave data</a>
          and their <a href="/waveobs.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.data_spec">Real time raw spectral wave data</a>
          and their <a href="/data_spec.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.swdir">Real time raw spectral wave (alpha1) data</a>
          and their <a href="/data_spec.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.swdir2">Real time raw spectral wave (alpha2) data</a>
          and their <a href="/data_spec.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.swr1">Real time raw spectral wave (r1) data</a>
          and their <a href="/data_spec.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.swr2">Real time raw spectral wave (r2) data</a>
          and their <a href="/data_spec.shtml"> description</a>.</li>
          <li><a href="/data/realtime2/41013.supl">Real time supplemental measurements data</a>
          and their <a href="/faq/measdes.shtml#supl"> description</a>.</li>
          <li><a href="/data/derived2/41013.dmv">Real time derived measurements data</a>
          and their <a href="/faq/measdes.shtml#deriv"> description</a>.</li>
        </ul>
        <br>
